## server configuration
server.port=8080
server.servlet.context-path=/app
server.shutdown=graceful

## spring configuration
spring.application.name=web-app
spring.threads.virtual.enabled=true

## docker compose configuration
spring.docker.compose.enabled=true
spring.docker.compose.lifecycle-management=start-and-stop

## Actuator configuration
management.info.git.mode=full
management.info.build.enabled=true
management.endpoints.web.exposure.include=health,info
management.endpoints.web.exposure.exclude=env
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

## OpenAPI config
app.openapi.host=localhost
springdoc.show-actuator=false
## Default Path is: Scheme(http/https)://${app.openapi.host}:${server.port}/${server.servlet.context-path}/${springdoc.api-docs.version}/api-docs
# e.g., http://loclahost:8080/app/3/api-docs
springdoc.api-docs.enabled=false
## Default Path is: Scheme(http/https)://${app.openapi.host}:${server.port}/${server.servlet.context-path}/swagger-ui.html
# e.g., http://loclahost:8080/app/swagger-ui.html
springdoc.swagger-ui.enabled=false

## App Filter logger configs
app.filter.logging-enabled=false
app.filter.include-request-body=false
app.filter.include-request-headers=false
app.filter.include-response-headers=false
app.filter.include-response-body=false
app.filter.max-body-length=1000

## App Rest Client configs
app.external-service.client-base-url=http://localhost:8081/api
app.external-service.client-connect-timeout=2000
app.external-service.client-read-timeout=2000
app.external-service.client-logging-enabled=false
app.external-service.client-include-request-headers=false
app.external-service.client-include-request-body=false
app.external-service.client-include-response-headers=false
app.external-service.client-include-response-body=false
app.external-service.client-max-body-length=1000
